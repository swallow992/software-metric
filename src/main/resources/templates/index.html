<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Software Metric</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="shell">
    <nav class="topbar" aria-label="主导航">
        <a class="brand" th:href="@{/}">Software Metric</a>
        <div class="nav-actions">
            <a class="nav-link active" th:href="@{/}">总览</a>
            <a class="nav-link" th:href="@{/analyze}">源码分析</a>
            <a class="nav-link" th:href="@{/estimate}">估算模型</a>
            <a class="nav-link" th:href="@{/use-case-model}">用例模型</a>
        </div>
    </nav>

    <section class="workspace">
        <div class="panel intro">
            <p class="eyebrow" th:text="${phase}">阶段一：项目初始化</p>
            <h1>软件度量自动化工具</h1>
            <p class="lead">面向 Java 项目，聚合代码规模、复杂度、面向对象指标和估算模型。</p>
            <div class="action-row">
                <a class="primary-button" th:href="@{/analyze}">开始分析</a>
                <a class="secondary-button" th:href="@{/estimate}">项目估算</a>
                <a class="secondary-button" th:href="@{/use-case-model}">用例模型</a>
                <a class="secondary-button" href="/docs/PROJECT_PLAN.md">项目文档</a>
            </div>
        </div>

        <div class="panel status-panel">
            <h2>当前任务</h2>
            <ol class="step-list">
                <li th:each="step : ${nextSteps}" th:text="${step}">接入 Eclipse JDT ASTParser</li>
            </ol>
        </div>
    </section>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
