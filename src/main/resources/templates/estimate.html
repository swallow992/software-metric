<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>估算模型 - Software Metric</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="shell">
    <nav class="topbar" aria-label="主导航">
        <a class="brand" th:href="@{/}">Software Metric</a>
        <div class="nav-actions">
            <a class="nav-link" th:href="@{/}">总览</a>
            <a class="nav-link" th:href="@{/analyze}">源码分析</a>
            <a class="nav-link active" th:href="@{/estimate}">估算模型</a>
            <a class="nav-link" th:href="@{/use-case-model}">用例模型</a>
        </div>
    </nav>

    <section class="workspace single estimate-workspace">
        <form class="panel estimate-form" method="post" th:action="@{/estimate}">
            <div>
                <p class="eyebrow">FP / UCP / COCOMO</p>
                <h1>项目估算</h1>
            </div>

            <section class="form-section">
                <h2>功能点</h2>
                <div class="form-grid">
                    <label class="field">
                        <span>外部输入 EI</span>
                        <input type="number" min="0" name="externalInputs" th:value="${input.externalInputs()}">
                    </label>
                    <label class="field">
                        <span>外部输出 EO</span>
                        <input type="number" min="0" name="externalOutputs" th:value="${input.externalOutputs()}">
                    </label>
                    <label class="field">
                        <span>外部查询 EQ</span>
                        <input type="number" min="0" name="externalInquiries" th:value="${input.externalInquiries()}">
                    </label>
                    <label class="field">
                        <span>内部逻辑文件 ILF</span>
                        <input type="number" min="0" name="internalLogicalFiles" th:value="${input.internalLogicalFiles()}">
                    </label>
                    <label class="field">
                        <span>外部接口文件 EIF</span>
                        <input type="number" min="0" name="externalInterfaceFiles" th:value="${input.externalInterfaceFiles()}">
                    </label>
                    <label class="field">
                        <span>技术复杂度调整 0-70</span>
                        <input type="number" min="0" max="70" name="technicalComplexityDegree" th:value="${input.technicalComplexityDegree()}">
                    </label>
                </div>
            </section>

            <section class="form-section">
                <h2>用例点</h2>
                <div class="form-grid">
                    <label class="field">
                        <span>简单参与者</span>
                        <input type="number" min="0" name="simpleActors" th:value="${input.simpleActors()}">
                    </label>
                    <label class="field">
                        <span>一般参与者</span>
                        <input type="number" min="0" name="averageActors" th:value="${input.averageActors()}">
                    </label>
                    <label class="field">
                        <span>复杂参与者</span>
                        <input type="number" min="0" name="complexActors" th:value="${input.complexActors()}">
                    </label>
                    <label class="field">
                        <span>简单用例</span>
                        <input type="number" min="0" name="simpleUseCases" th:value="${input.simpleUseCases()}">
                    </label>
                    <label class="field">
                        <span>一般用例</span>
                        <input type="number" min="0" name="averageUseCases" th:value="${input.averageUseCases()}">
                    </label>
                    <label class="field">
                        <span>复杂用例</span>
                        <input type="number" min="0" name="complexUseCases" th:value="${input.complexUseCases()}">
                    </label>
                    <label class="field">
                        <span>技术因子</span>
                        <input type="number" min="0.1" step="0.01" name="useCaseTechnicalFactor" th:value="${input.useCaseTechnicalFactor()}">
                    </label>
                    <label class="field">
                        <span>环境因子</span>
                        <input type="number" min="0.1" step="0.01" name="useCaseEnvironmentalFactor" th:value="${input.useCaseEnvironmentalFactor()}">
                    </label>
                    <label class="field">
                        <span>每用例点工时</span>
                        <input type="number" min="0.1" step="0.1" name="hoursPerUseCasePoint" th:value="${input.hoursPerUseCasePoint()}">
                    </label>
                </div>
            </section>

            <section class="form-section">
                <h2>COCOMO</h2>
                <div class="form-grid">
                    <label class="field">
                        <span>规模 KLOC</span>
                        <input type="number" min="0.1" step="0.1" name="sourceKloc" th:value="${input.sourceKloc()}">
                    </label>
                    <label class="field">
                        <span>项目类型</span>
                        <select name="cocomoMode">
                            <option value="organic" th:selected="${input.cocomoMode() == 'organic'}">有机型</option>
                            <option value="semi" th:selected="${input.cocomoMode() == 'semi'}">半分离型</option>
                            <option value="embedded" th:selected="${input.cocomoMode() == 'embedded'}">嵌入型</option>
                        </select>
                    </label>
                    <label class="field">
                        <span>人月成本</span>
                        <input type="number" min="0" step="100" name="personMonthCost" th:value="${input.personMonthCost()}">
                    </label>
                </div>
            </section>

            <button class="primary-button" type="submit">计算估算</button>
        </form>

        <section class="panel message-panel error-panel" th:if="${errorMessage}">
            <h2>估算失败</h2>
            <p th:text="${errorMessage}">参数不正确。</p>
        </section>

        <section class="panel result-panel" th:if="${result}">
            <div class="result-heading">
                <div>
                    <p class="eyebrow">估算结果</p>
                    <h2>规模、工作量、成本与工期</h2>
                </div>
                <form class="inline-report-form" method="get">
                    <input type="hidden" name="externalInputs" th:value="${input.externalInputs()}">
                    <input type="hidden" name="externalOutputs" th:value="${input.externalOutputs()}">
                    <input type="hidden" name="externalInquiries" th:value="${input.externalInquiries()}">
                    <input type="hidden" name="internalLogicalFiles" th:value="${input.internalLogicalFiles()}">
                    <input type="hidden" name="externalInterfaceFiles" th:value="${input.externalInterfaceFiles()}">
                    <input type="hidden" name="technicalComplexityDegree" th:value="${input.technicalComplexityDegree()}">
                    <input type="hidden" name="simpleActors" th:value="${input.simpleActors()}">
                    <input type="hidden" name="averageActors" th:value="${input.averageActors()}">
                    <input type="hidden" name="complexActors" th:value="${input.complexActors()}">
                    <input type="hidden" name="simpleUseCases" th:value="${input.simpleUseCases()}">
                    <input type="hidden" name="averageUseCases" th:value="${input.averageUseCases()}">
                    <input type="hidden" name="complexUseCases" th:value="${input.complexUseCases()}">
                    <input type="hidden" name="useCaseTechnicalFactor" th:value="${input.useCaseTechnicalFactor()}">
                    <input type="hidden" name="useCaseEnvironmentalFactor" th:value="${input.useCaseEnvironmentalFactor()}">
                    <input type="hidden" name="hoursPerUseCasePoint" th:value="${input.hoursPerUseCasePoint()}">
                    <input type="hidden" name="sourceKloc" th:value="${input.sourceKloc()}">
                    <input type="hidden" name="cocomoMode" th:value="${input.cocomoMode()}">
                    <input type="hidden" name="personMonthCost" th:value="${input.personMonthCost()}">
                    <button class="secondary-button" type="submit" th:formaction="@{/reports/estimate/html}">HTML 报告</button>
                    <button class="secondary-button" type="submit" th:formaction="@{/reports/estimate/markdown}">Markdown</button>
                    <button class="secondary-button" type="submit" th:formaction="@{/reports/estimate/pdf}">PDF</button>
                </form>
            </div>

            <div class="summary-grid estimate-summary">
                <div class="summary-item">
                    <span>未调整功能点</span>
                    <strong th:text="${result.unadjustedFunctionPoints()}">0</strong>
                </div>
                <div class="summary-item">
                    <span>调整系数 VAF</span>
                    <strong th:text="${#numbers.formatDecimal(result.valueAdjustmentFactor(), 1, 2)}">0.00</strong>
                </div>
                <div class="summary-item">
                    <span>功能点 FP</span>
                    <strong th:text="${#numbers.formatDecimal(result.functionPoints(), 1, 2)}">0.00</strong>
                </div>
                <div class="summary-item">
                    <span>参与者权重</span>
                    <strong th:text="${result.actorWeight()}">0</strong>
                </div>
                <div class="summary-item">
                    <span>用例权重</span>
                    <strong th:text="${result.useCaseWeight()}">0</strong>
                </div>
                <div class="summary-item">
                    <span>用例点 UCP</span>
                    <strong th:text="${#numbers.formatDecimal(result.useCasePoints(), 1, 2)}">0.00</strong>
                </div>
                <div class="summary-item">
                    <span>用例工作量</span>
                    <strong th:text="${#numbers.formatDecimal(result.useCaseEffortPersonMonths(), 1, 2)}">0.00</strong>
                </div>
                <div class="summary-item">
                    <span>COCOMO 类型</span>
                    <strong th:text="${result.cocomoModeName()}">有机型</strong>
                </div>
                <div class="summary-item">
                    <span>COCOMO 工作量</span>
                    <strong th:text="${#numbers.formatDecimal(result.cocomoEffortPersonMonths(), 1, 2)}">0.00</strong>
                </div>
                <div class="summary-item">
                    <span>开发工期</span>
                    <strong th:text="${#numbers.formatDecimal(result.developmentTimeMonths(), 1, 2)}">0.00</strong>
                </div>
                <div class="summary-item">
                    <span>平均人员</span>
                    <strong th:text="${#numbers.formatDecimal(result.averageStaff(), 1, 2)}">0.00</strong>
                </div>
                <div class="summary-item">
                    <span>估算成本</span>
                    <strong th:text="${#numbers.formatDecimal(result.estimatedCost(), 1, 2)}">0.00</strong>
                </div>
            </div>
        </section>
    </section>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
